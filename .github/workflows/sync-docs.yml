name: Sync docs/ to IA-DataFlow-Hub

on:
  push:
    branches:
      - main
    paths:
      - 'Docs/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio origen
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout repositorio destino
        uses: actions/checkout@v4
        with:
          repository: IA-DataFlow-Hub/IA-DataFlow-Hub
          token: ${{ secrets.SYNC_PAT }}
          path: destination

      - name: Limpiar y copiar docs/
        run: |
          rm -rf destination/docs
          mkdir -p destination/docs
          cp -r source/Docs/. destination/docs/

      - name: Commit y push
        run: |
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Sin cambios, nada que commitear."
          else
            git commit -m "sync: actualización automática de docs/ desde IA-DataFlow-Hub/docs@${{ github.sha }}"
            git push
          fi
